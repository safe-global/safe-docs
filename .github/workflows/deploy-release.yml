name: Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag_version:
        description: "Tag version (e.g., v4.38.0). Leave empty to auto-generate next patch."
        required: false
        default: ""
      bump_type:
        description: "Version bump type (when auto-generating)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: safe-global/github-reusable-workflows/.github/workflows/create-release.yaml@v2.1.0
    with:
      tag_version: ${{ inputs.tag_version }}
      bump_type: ${{ inputs.bump_type }}
      allowed_users: ${{ vars.RELEASE_USERS }}

  deploy:
    if: "!cancelled() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')"
    needs: create-release
    runs-on: ubuntu-latest
    permissions: write-all
    name: Deploy release

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.8.0
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build app
        shell: bash
        run: pnpm build
        env:
          NEXT_PUBLIC_GOOGLE_ANALYTICS_DOMAIN: ${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_DOMAIN }}
          NEXT_PUBLIC_GOOGLE_ANALYTICS_TRACKING_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_TRACKING_ID }}
          NEXT_PUBLIC_IS_PRODUCTION: true
          NEXT_PUBLIC_N8N_WEBHOOK_URL: ${{ secrets.NEXT_PUBLIC_N8N_WEBHOOK_URL }}
          NEXT_PUBLIC_HOST_URL: 'https://docs.safe.global'
          NODE_OPTIONS: '--max-old-space-size=8000'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Deploy the main branch to production environment
      - name: Deploy to the production S3
        env:
          BUCKET: s3://${{ secrets.AWS_STAGING_BUCKET_NAME }}/releases/${{ needs.create-release.outputs.tag || github.event.release.tag_name }}
        run: bash ./.github/scripts/s3_upload.sh

      # Script to prepare production deployments
      - run: bash ./.github/scripts/prepare_production_deployment.sh
        env:
          PROD_DEPLOYMENT_HOOK_TOKEN: ${{ secrets.PROD_DEPLOYMENT_HOOK_TOKEN }}
          PROD_DEPLOYMENT_HOOK_URL: ${{ secrets.PROD_DEPLOYMENT_HOOK_URL }}
          VERSION_TAG: ${{ needs.create-release.outputs.tag || github.event.release.tag_name }}
