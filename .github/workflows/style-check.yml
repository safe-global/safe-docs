name: Style check

on: pull_request

jobs:
  vale-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Vale Linter
        uses: vale-cli/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a  # v2.1.2
        with:
          vale_flags: "--glob=pages/**/*.{md,mdx} --minAlertLevel=error"
          fail_on_error: true
