name: Style check
on: pull_request

jobs:
  vale-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vale Linter
        uses: vale-cli/vale-action@v2.1.1
        with:
          vale_flags: "--glob=pages/**/*.{md,mdx} --minAlertLevel=error"
          fail_on_error: true
