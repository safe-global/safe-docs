name: Report readability

on: pull_request

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
    report-readability:
        name: Report readability
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo with history
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: Rebilly/lexi@v2
              with:
                  github-token: ${{ github.token }}
                  glob: '**/*.{md,mdx}'
